# ============================================================
# Misinformation Protest Simulation - Configuration
# ============================================================

simulation:
  steps: 100
  width: 20
  height: 20
  seed: 42

agents:
  citizen_density: 0.10        # ~40 citizens on 20x20 grid
  cop_density: 0.02            # ~8 safety officers
  influencer_count: 3
  official_count: 1
  vision: 3                    # sight radius (Moore neighborhood)
  max_jail_term: 8
  memory_limit: 10             # max recent memories stored per agent
  message_context_size: 5      # recent utterances shown in LLM prompt
  post_context_size: 5         # recent SNS posts shown in LLM prompt
  llm_decision_interval: 1     # call LLM every N steps (1 = every step)
  initial_legitimacy_government: 0.5
  initial_legitimacy_protest: 0.3
  average_media_literacy: 0.5
  average_trust_in_official_info: 0.5
  average_trust_in_peer_info: 0.6

llm:
  model: "qwen3:8b"            # Ollama model name (see README for alternatives)
  base_url: "http://localhost:11434"
  temperature: 0.4
  max_tokens: 4096             # large budget for thinking + reasoning + JSON output
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05
  use_llm: true                # false = rule-based fallback (no Ollama required)

# Landmark regions on the 20x20 grid
# Each landmark: x: [x_min, x_max], y: [y_min, y_max], center: [cx, cy]
landmarks:
  home_area:
    x: [0, 5]
    y: [0, 5]
    center: [2, 2]
  station:
    x: [8, 11]
    y: [0, 3]
    center: [9, 1]
  central_square:
    x: [7, 13]
    y: [7, 13]
    center: [10, 10]
  city_hall:
    x: [15, 19]
    y: [14, 19]
    center: [17, 16]
  media_zone:
    x: [0, 4]
    y: [14, 19]
    center: [2, 16]
  small_gathering_a:
    x: [5, 8]
    y: [9, 13]
    center: [6, 11]
  small_gathering_b:
    x: [13, 17]
    y: [3, 7]
    center: [15, 5]
  police_station:
    x: [16, 19]
    y: [0, 4]
    center: [17, 2]
  exit_zone:
    x: [0, 3]
    y: [9, 13]
    center: [1, 11]

# Misinformation events that fire at specified steps
events:
  - event_id: "evt_001"
    step: 15
    location: "city_hall"
    ground_truth: "配給待ちの列で口論が起き、受付が一時停止した。"
    rumor: "行政職員が市民を意図的に排除したとの証言が広まっている。"
    truth_status: "MISLEADING"
    severity: 0.4
    spread_radius: 4
    online_reach: 40
  - event_id: "evt_002"
    step: 40
    location: "central_square"
    ground_truth: "中央広場で自然発生的に人々が集まり始めた。"
    rumor: "抗議に参加しないと配給がもらえなくなるという噂が広まっている。"
    truth_status: "FALSE"
    severity: 0.6
    spread_radius: 6
    online_reach: 60
  - event_id: "evt_003"
    step: 65
    location: "media_zone"
    ground_truth: "地域メディアが evt_001 の真相について独自調査を開始した。"
    rumor: "メディアが行政に圧力をかけられ真実を報道できないという噂。"
    truth_status: "UNVERIFIED"
    severity: 0.3
    spread_radius: 5
    online_reach: 50

official:
  response_delay: 30           # step after which official corrections are posted

# Influencer configurations (3 influencers with different alignments)
influencers:
  - alignment: "sensational"
    reach_base: 25
    posting_interval: 5
  - alignment: "skeptical"
    reach_base: 15
    posting_interval: 8
  - alignment: "official_friendly"
    reach_base: 20
    posting_interval: 10

visualization:
  save_frames: true
  frame_interval: 1            # save a frame every N steps
  output_dir: "output"
  figure_size: [12, 10]
  dpi: 120

logging:
  level: "INFO"
  log_file: "simulation.log"
